    // ═══════════════════════════════════════════════════════════════
    // SCORECARD TRACKER — builds hole-by-hole from ESPN deltas
    // ═══════════════════════════════════════════════════════════════
    // Cards structure: { "Golfer Name": { 1: [s1,s2,...,s18], 2: [...], 3: [...], 4: [...] } }
    //   where each value is the score relative to par on that hole (0=par, -1=birdie, +1=bogey, null=unknown)
    // Snap structure: { "Golfer Name": { toPar, thru, round } } — last known state
    
    function updateScorecards(currentScores, currentRound, prevSnap, cards, coursePars) {
      const newCards = JSON.parse(JSON.stringify(cards)); // deep clone
      const newSnap = {};
      const detectedAces = [];
    
      for (const [name, s] of Object.entries(currentScores)) {
        if (s.status === "cut" || s.status === "wd") {
          // Keep last known snap for cut/wd players
          newSnap[name] = prevSnap[name] || { toPar: s.toPar, thru: 0, round: currentRound };
          continue;
        }
    
        // Parse thru: "F" = 18, "12" = 12, empty/dash = 0
        let thruNow = 0;
        if (s.thru === "F" || s.thru === "18") thruNow = 18;
        else if (s.thru && !isNaN(parseInt(s.thru))) thruNow = parseInt(s.thru);
    
        const prev = prevSnap[name] || null;
        const rd = currentRound || 1;
    
        // Initialize card for this round if needed
        if (!newCards[name]) newCards[name] = {};
        if (!newCards[name][rd]) newCards[name][rd] = new Array(18).fill(null);
    
        if (prev) {
          const prevThru = prev.thru || 0;
          const prevRound = prev.round || rd;
          const prevToPar = prev.toPar;
    
          if (prevRound === rd && thruNow > prevThru) {
            // Same round, golfer advanced — compute delta
            const toParDelta = s.toPar - prevToPar;
    
            if (thruNow === prevThru + 1) {
              // Single hole advanced — exact score known
              const holeIdx = thruNow - 1; // 0-indexed
              const holePar = coursePars[holeIdx] || 4;
              newCards[name][rd][holeIdx] = toParDelta; // relative to par
    
              // Check for ace: score of 1 on any hole
              const actualStrokes = holePar + toParDelta;
              if (actualStrokes === 1) {
                detectedAces.push(name);
              }
            } else if (thruNow > prevThru + 1) {
              // Gap: multiple holes at once — distribute delta across gap as unknowns
              // We know the total delta but not per-hole
              const gapSize = thruNow - prevThru;
              // Mark all gap holes with null (unknown) but store the gap info
              // Actually, we can check if any are already filled and only fill unknowns
              for (let h = prevThru; h < thruNow; h++) {
                if (newCards[name][rd][h] === null) {
                  // If gap is 2 holes and delta is -2, we could guess -1 each, but safer to leave null
                  // Exception: if gap is exactly 1... (already handled above)
                }
              }
              // At minimum, mark the last hole with the cumulative delta as a hint
              // This ensures the running total stays correct
              // Store gap info as a special marker
              const lastHole = thruNow - 1;
              if (gapSize <= 3) {
                // For small gaps, evenly distribute (imperfect but useful)
                const perHole = toParDelta / gapSize;
                for (let h = prevThru; h < thruNow; h++) {
                  if (newCards[name][rd][h] === null) {
                    newCards[name][rd][h] = perHole; // fractional — we'll round for display
                  }
                }
              }
            }
          } else if (prevRound < rd) {
            // New round started — thruNow is on a new round
            // The toPar delta since last snap includes finishing the old round + starting the new one
            // We can't easily split this, but thruNow tells us where they are in the new round
            if (thruNow > 0 && thruNow <= 1) {
              // Just started new round, first hole completed
              const holeIdx = 0;
              // toPar change since last snap = old round finish + this hole
              // If we know their old round final toPar, we can compute this hole
              const prevRoundCard = newCards[name][prevRound];
              if (prevRoundCard) {
                const prevRoundSum = prevRoundCard.reduce((a, v) => a + (v || 0), 0);
                // Their toPar at end of prev round should be: whatever it was at start of prev round + prevRoundSum
                // This gets complex — for round boundaries, just record the delta
                newCards[name][rd][holeIdx] = s.toPar - prevToPar;
              }
            }
          }
        }
    
        newSnap[name] = { toPar: s.toPar, thru: thruNow, round: rd };
      }
    
      return { cards: newCards, snap: newSnap, detectedAces };
    }

            // Fallback to localStorage
            try { const v = localStorage.getItem(k); resolve(v ? JSON.parse(v) : null); }

        });
      }
      try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : null; }
      catch { return null; }
    }

      // Always save to localStorage as backup
      try { localStorage.setItem(k, JSON.stringify(d)); } catch {}

      if (owgrMap[k]) return owgrMap[k];
      // Split into parts
      const parts = k.split(" ");
      if (parts.length < 2) return 999;
      const first = parts[0];
      const last = parts[parts.length - 1];
      // Find candidates where BOTH first and last name match
      let best = null;
      for (const [owgrName, rank] of Object.entries(owgrMap)) {
        const oParts = owgrName.split(" ");

        const oFirst = oParts[0];
        const oLast = oParts[oParts.length - 1];
        // Last name must match exactly
        if (oLast !== last) continue;
        // First name: exact match or one contains the other (handles "jj" vs "jj", "si woo" vs "si")
        if (oFirst === first || first.startsWith(oFirst) || oFirst.startsWith(first)) {

          if (best !== null) return 999;
          best = rank;

    function parseESPN(json) {

          // Derive from linescores instead
          let thru = "";
          let today = 0;
          const rounds = [];
    
          if (c.linescores?.length) {
            // Each linescore item is a round: { value: 69, displayValue: "-3", period: 1, linescores: [{hole data}] }
            // Find the latest round with hole-by-hole data
            let latestRd = null;
            let latestRdNum = 0;
            for (const rd of c.linescores) {
              if (rd.value != null) rounds.push(rd.value);
              if (rd.linescores?.length) {
                const rdNum = rd.period || latestRdNum + 1;
                if (rdNum >= latestRdNum) {
                  latestRdNum = rdNum;
                  latestRd = rd;
                }
              }
            }
    
            if (latestRd && latestRd.linescores?.length) {
              const holesPlayed = latestRd.linescores.filter(h => h.value != null && h.value > 0).length;
    
              // Check if this is the current tournament round or a previous one
              const tournRound = r.round || 1;
              const golferRound = latestRd.period || latestRdNum;
    
              if (holesPlayed >= 18 && golferRound < tournRound) {
                // Golfer finished a PREVIOUS round but hasn't started the current round
                // Look for tee time in the current round's linescore item
                const curRdItem = c.linescores.find(rd => rd.period === tournRound);
                if (curRdItem?.linescores?.length) {
                  // They have hole data for current round — count it
                  const curHoles = curRdItem.linescores.filter(h => h.value != null && h.value > 0).length;
                  thru = curHoles >= 18 ? "F" : (curHoles > 0 ? String(curHoles) : "—");

                  for (const h of curRdItem.linescores) {
                    if (h.value != null && h.value > 0) {
                      gross += h.value;
                      const stVal = h.scoreType?.displayValue ? toN(h.scoreType.displayValue) : 0;
                      parSum += (h.par || (h.value - stVal) || 0);

                  let teeTime = "";
                  if (curRdItem) {

                    const rdStr = JSON.stringify(curRdItem);
                    // Look for patterns like "Sat Mar 14 14:35" or "Thu Mar 12 08:40:00 PDT 2026"
                    const teeMatch = rdStr.match(/"displayValue":"((?:Mon|Tue|Wed|Thu|Fri|Sat|Sun)\s+\w+\s+\d+\s+\d{1,2}:\d{2}[^"]*)"/);
                    if (teeMatch) teeTime = teeMatch[1];

                      if (m) { teeTime = m[1]; break; }

    // ── Find current event from scoreboard calendar ─────────────
    function findCurrentEvent(scoreboard) {
      const cal = scoreboard?.leagues?.[0]?.calendar || [];
      const now = Date.now();
      // Find an event that is currently active (start <= now <= end + 1 day)
      for (const item of cal) {
        const start = new Date(item.startDate).getTime();
        const end = new Date(item.endDate).getTime() + 86400000; // +1 day buffer
        if (now >= start - 86400000 && now <= end) { // start -1 day to catch pre-tournament
          return { id: item.id, name: item.label };
        }
      }
      // Fallback: find next upcoming
      const upcoming = cal.filter(c => new Date(c.startDate).getTime() > now).sort(
        (a, b) => new Date(a.startDate) - new Date(b.startDate)
      );
      if (upcoming.length) return { id: upcoming[0].id, name: upcoming[0].label };
      return null;
    }

              if (stDisplay === "18" || stDisplay.toLowerCase() === "f" || stDisplay.toLowerCase() === "finished") thru = "F";

              else if (stDisplay.includes(":")) thru = stDisplay; // tee time like "1:30 PM"
            }
          }
    
          // Last resort: if golfer has completed rounds but no thru, show F
          if (!thru && rounds.length > 0) thru = "F";
    
          return {
            name,
            toPar,
            today,
            thru,
            status: gStatus,
            pos: comp.order || 0,
            amateur: !!comp.amateur,
            rounds,
            holeByHole,
            detectedCoursePars,
          };
        }));
    
        for (const res of results) {
          if (res.status === "fulfilled" && res.value) {
            const g = res.value;
            r.golfers[g.name] = {
              toPar: g.toPar, today: g.today, thru: g.thru, status: g.status,
              pos: g.pos, amateur: g.amateur, rounds: g.rounds,
            };
            r.field.push(g.name);
            if (Object.keys(g.holeByHole).length > 0) {
              r.scorecards[g.name] = g.holeByHole;
            }
            if (g.detectedCoursePars && !r.coursePars) {
              r.coursePars = g.detectedCoursePars;
            }
          }
        }
      }
    
      // Calculate cut line
      const cuts = Object.values(r.golfers).filter(g => g.status === "cut");
      if (cuts.length) r.cutLine = Math.min(...cuts.map(g => g.toPar));
    
      return r;
    }
    
    // ── Team scoring ────────────────────────────────────────────
    function calcTeam(picks, scores, cutLine) {
      const gs = picks.map(name => {
        const s = scores[name];
        if (!s) return { name, toPar: 0, today: 0, thru: "—", status: "unknown", isCut: false, adj: 0 };
        const isCut = s.status === "cut" || s.status === "wd";
        let adj = s.toPar;
        if (isCut && cutLine != null) adj = s.toPar + Math.max(0, s.toPar - cutLine);
        return { name, toPar: s.toPar, today: s.today, thru: s.thru || "—", status: s.status, isCut, adj };
      });
      gs.sort((a, b) => a.adj - b.adj);
      const counting = gs.slice(0, CFG.COUNT);
      return {
        golferScores: gs,
        teamTotal: counting.reduce((s, g) => s + g.adj, 0),
        bestPlayer: gs[0]?.adj ?? 0,
        todayTotal: counting.reduce((s, g) => s + (g.today || 0), 0),
      };
    }

    // RADAR MAP — RainViewer tiles on OpenStreetMap via canvas
    // ═══════════════════════════════════════════════════════════════
    function RadarMap({ lat, lon }) {
      const canvasRef = useRef(null);
      const [radarTs, setRadarTs] = useState(null);
      const [radarHost, setRadarHost] = useState("");
      const [animIdx, setAnimIdx] = useState(0);
      const [frames, setFrames] = useState([]);
      const [playing, setPlaying] = useState(true);
      const [radarTime, setRadarTime] = useState("");
      const zoom = 7;
      const W = 400, H = 280;
    
      // Tile math helpers
      const lon2tile = (lon, z) => ((lon + 180) / 360) * Math.pow(2, z);
      const lat2tile = (lat, z) => (1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, z);
    
      // Fetch RainViewer available frames
      useEffect(() => {
        fetch("https://api.rainviewer.com/public/weather-maps.json")
          .then(r => r.json())
          .then(data => {
            setRadarHost(data.host);
            const past = (data.radar?.past || []).slice(-6);
            const future = (data.radar?.nowcast || []).slice(0, 3);
            const all = [...past, ...future];
            setFrames(all);
            setAnimIdx(past.length - 1); // start at most recent
          })
          .catch(() => {});
      }, []);
    
      // Animation loop
      useEffect(() => {
        if (!playing || frames.length === 0) return;
        const t = setInterval(() => {
          setAnimIdx(prev => (prev + 1) % frames.length);
        }, 800);
        return () => clearInterval(t);
      }, [playing, frames.length]);
    
      // Draw tiles
      useEffect(() => {
        const canvas = canvasRef.current;
        if (!canvas || frames.length === 0 || !radarHost) return;
        const ctx = canvas.getContext("2d");
    
        const centerTileX = lon2tile(lon, zoom);
        const centerTileY = lat2tile(lat, zoom);
        const tilesX = Math.ceil(W / 256) + 1;
        const tilesY = Math.ceil(H / 256) + 1;
        const offsetX = (W / 2) - (centerTileX - Math.floor(centerTileX)) * 256;
        const offsetY = (H / 2) - (centerTileY - Math.floor(centerTileY)) * 256;
        const startTX = Math.floor(centerTileX) - Math.floor(tilesX / 2);
        const startTY = Math.floor(centerTileY) - Math.floor(tilesY / 2);
    
        // Dark base map
        ctx.fillStyle = "#1a1a2e";
        ctx.fillRect(0, 0, W, H);
    
        let loaded = 0;
        const total = tilesX * tilesY * 2; // base + radar
    
        const checkDone = () => {
          loaded++;
          if (loaded >= total) {
            // Draw pin
            ctx.fillStyle = "#FFD700";
            ctx.beginPath();
            ctx.arc(W / 2, H / 2, 4, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = "#000";
            ctx.lineWidth = 1.5;
            ctx.stroke();
          }
        };
    
        const frame = frames[animIdx];
        if (frame) {
          const ts = new Date(frame.time * 1000);
          const hh = ts.getHours() % 12 || 12;
          const mm = String(ts.getMinutes()).padStart(2, "0");
          const ap = ts.getHours() >= 12 ? "PM" : "AM";
          setRadarTime(`${hh}:${mm} ${ap}`);
        }
    
        for (let ty = 0; ty < tilesY; ty++) {
          for (let tx = 0; tx < tilesX; tx++) {
            const tileX = startTX + tx;
            const tileY = startTY + ty;
            const drawX = offsetX + (tx - Math.floor(tilesX / 2)) * 256;
            const drawY = offsetY + (ty - Math.floor(tilesY / 2)) * 256;
    
            // Base map tile (dark CartoDB)
            const baseImg = new Image();
            baseImg.crossOrigin = "anonymous";
            baseImg.onload = () => { ctx.drawImage(baseImg, drawX, drawY, 256, 256); checkDone(); };
            baseImg.onerror = () => checkDone();
            baseImg.src = `https://cartodb-basemaps-a.global.ssl.fastly.net/dark_all/${zoom}/${tileX}/${tileY}.png`;
    
            // Radar overlay tile
            if (frame) {
              const radImg = new Image();
              radImg.crossOrigin = "anonymous";
              radImg.onload = () => {
                ctx.globalAlpha = 0.65;
                ctx.drawImage(radImg, drawX, drawY, 256, 256);
                ctx.globalAlpha = 1.0;
                checkDone();
              };
              radImg.onerror = () => checkDone();
              radImg.src = `${radarHost}${frame.path}/256/${zoom}/${tileX}/${tileY}/2/1_1.png`;
            } else {
              checkDone();
            }
          }
        }
      }, [animIdx, frames, radarHost, lat, lon]);
    
      return (
        <div style={{ position: "relative" }}>
          <canvas ref={canvasRef} width={W} height={H} style={{
            width: "100%", maxWidth: W, height: "auto",
            borderRadius: 4, display: "block", margin: "0 auto",
          }} />
          {/* Overlay controls */}
          <div style={{
            position: "absolute", bottom: 6, left: 0, right: 0,
            display: "flex", justifyContent: "center", alignItems: "center", gap: 10,
          }}>
            <button onClick={() => setPlaying(p => !p)} style={{
              background: "rgba(0,0,0,0.6)", border: "1px solid rgba(200,184,106,0.15)",
              borderRadius: 3, color: "#d4c87a", cursor: "pointer", padding: "2px 8px", fontSize: 13,
            }}>
              {playing ? "❚❚" : "▶"}
            </button>
            <span style={{
              background: "rgba(0,0,0,0.6)", padding: "2px 8px", borderRadius: 3,
              fontFamily: "monospace", fontSize: 12, color: "#d4c87a",
            }}>
              {radarTime}
            </span>
          </div>
          {/* Legend */}
          <div style={{
            position: "absolute", top: 6, right: 6,
            display: "flex", alignItems: "center", gap: 3,
            background: "rgba(0,0,0,0.6)", padding: "3px 6px", borderRadius: 3,
          }}>
            <span style={{ fontSize: 9, color: "rgba(200,184,106,0.7)" }}>LIGHT</span>
            {["#20c030", "#40e020", "#e0e020", "#e08020", "#e02020", "#c020c0"].map((c, i) => (
              <div key={i} style={{ width: 10, height: 6, background: c, borderRadius: 1 }} />
            ))}
            <span style={{ fontSize: 9, color: "rgba(200,184,106,0.7)" }}>HEAVY</span>
          </div>
        </div>
      );
    }

          eventName = currentEvent.name;
    
          // Step 3: Fetch from core API with full competitor hydration
          const p = await fetchCoreLeaderboard(eventId);
          if (!p.name && eventName) p.name = eventName;
    
          setLiveScores(p.golfers);
          setCutLine(p.cutLine);
          setTStatus(p.status);
          setRound(p.round);
          setTName(p.name);
          setLastUp(new Date());
    
          // Store scorecards from ESPN hole-by-hole data
          if (Object.keys(p.scorecards).length > 0) {
            // Convert from {name: {rd: [{hole,strokes,par,scoreType}]}} to our format
            const cards = {};
            for (const [name, rdMap] of Object.entries(p.scorecards)) {
              cards[name] = {};
              for (const [rd, holes] of Object.entries(rdMap)) {
                cards[name][rd] = holes.map(h => h ? (h.strokes - h.par) : null);
              }
            }
            setScorecards(cards);
            await saveS(SK.CARDS, cards);
    
            // Auto-detect aces from hole-by-hole
            const detectedAces = [];
            for (const [name, rdMap] of Object.entries(p.scorecards)) {
              for (const holes of Object.values(rdMap)) {
                for (const h of holes) {
                  if (h && h.strokes === 1) detectedAces.push(name);
                }
              }
            }
            if (detectedAces.length > 0) {
              const curAces = await loadS(SK.ACES) || [];
              const merged = [...new Set([...curAces, ...detectedAces])];
              if (merged.length > curAces.length) {
                setAces(merged);
                await saveS(SK.ACES, merged);
              }
            }
          }
    
          // Store course pars from ESPN
          if (p.coursePars) {
            setDetectedPars(p.coursePars);
          }
    
          await saveS(SK.CACHE, {
            golfers: p.golfers, cutLine: p.cutLine, status: p.status,
            round: p.round, name: p.name, ts: Date.now(),
          });
    
          // Build field with OWGR
          if (p.field.length > 0) {
            let owgrMap = await fetchOWGR();
            const nf = p.field.map((name, i) => {
              let owgr = 999;
              if (owgrMap) {
                owgr = findOWGR(name, owgrMap);
              }
              return { name, owgr };
            });
            nf.sort((a, b) => a.owgr - b.owgr);
            setField(nf);
            setFieldLoading(false);
            await saveS(SK.FIELD, nf);
          }
        } catch (e) {

          setFetchErr(`ESPN: ${e.message || "Network error"}. Showing cached data. Try Demo mode to test features.`);
        }
      }, [fetchOWGR]);
    
      // ── Auto-refresh ──────────────────────────────────────────
      useEffect(() => {
        if (!useManual && !demoMode) {
          fetchScores();
          fetchNews();
          const t = setInterval(fetchScores, CFG.REFRESH_MS);
          return () => clearInterval(t);
        }
      }, [fetchScores, fetchNews, useManual, demoMode]);
    
      // ── Auto-lock picks at scheduled time ──────────────────────
      useEffect(() => {
        if (picksLocked || !lockTime) return;
        const check = () => {
          if (new Date() >= new Date(lockTime)) {
            setPicksLocked(true);
            saveS("gp-picks-locked", true);
          }
        };
        check();
        const t = setInterval(check, 30000); // check every 30 seconds
        return () => clearInterval(t);
      }, [lockTime, picksLocked]);
    
      // ── Weather refresh (every 10 min) ────────────────────────
      useEffect(() => {
        if (tName) {
          fetchWeather(tName);

        }
      }, [tName, fetchWeather]);
    
      // ── Registration handler ──────────────────────────────────
      const handleReg = async () => {
        setRErr(""); setROk("");
        if (picksLocked) return setRErr("Picks are locked. Registration is closed.");
        if (!rName.trim()) return setRErr("Enter a team name.");
        if (!rOwner.trim()) return setRErr("Enter your name.");
        if (rOwner.trim().split(/\s+/).length < 2) return setRErr("Please enter your first and last name so we know who you are.");
        if (!rEmail.trim() || !rEmail.includes("@")) return setRErr("Enter a valid email.");
        if (!rTiebreaker.trim()) return setRErr("Enter your tiebreaker prediction (winning golfer's final score, e.g. -12).");
    
        // Validate tier picks — allow fewer if tier doesn't have enough golfers
        let totalPicks = 0;
        for (let i = 0; i < CFG.TIERS.length; i++) {
          const tierGolfers = registrationField.filter(g => g.owgr >= CFG.TIERS[i].range[0] && g.owgr <= CFG.TIERS[i].range[1]);

        }

            const effectivePicks = Math.min(CFG.TIERS[ti].picks, tierGolfers.length);

      // ── Computed values ───────────────────────────────────────
      const eff = useManual ? manual : liveScores;

      // ── Admin test team — random picks from field ─────────────
      const adminTeamPicks = useMemo(() => {

        // Deterministic "random" based on field — stays stable per tournament
        const shuffled = [...field].sort((a, b) => {
          const ha = a.name.split("").reduce((s, c) => s + c.charCodeAt(0), 0);

          for (let i = 0; i < tier.picks && i < tierPool.length; i++) {

        const entries = Object.entries(allTeams).map(([n, d]) => ({

      // Registration uses custom field (for upcoming tournaments) or ESPN live field
      const registrationField = useMemo(() => {

      }, [customField, field]);
    
      const allPicked = useMemo(() => {
        const s = new Set();
        Object.values(teams).forEach(t => t.picks?.forEach(p => s.add(p)));
        return [...s].sort();
      }, [teams]);
    
      const isMasters = (tName || "").toLowerCase().includes("masters");
    
      // ── Stats computation ─────────────────────────────────────
      const stats = useMemo(() => {
        const tc = Object.keys(teams).length;
        if (tc === 0) return null;
    
        // Pick frequency
        const pickCounts = {};
        Object.values(teams).forEach(t =>
          t.picks?.forEach(p => { pickCounts[p] = (pickCounts[p] || 0) + 1; })
        );
    
        // Most picked per tier
        const mostPickedByTier = CFG.TIERS.map(tier => {
          const tierNames = field
            .filter(g => g.owgr >= tier.range[0] && g.owgr <= tier.range[1])
            .map(g => g.name);
          const inTier = Object.entries(pickCounts)
            .filter(([n]) => tierNames.includes(n))
            .sort((a, b) => b[1] - a[1]);
          return inTier[0]
            ? { name: inTier[0][0], count: inTier[0][1], pct: Math.round(inTier[0][1] / tc * 100) }
            : null;
        });
    
        // Overall top 5 most picked
        const mostPicked = Object.entries(pickCounts)
          .sort((a, b) => b[1] - a[1])
          .slice(0, 5)
          .map(([n, c]) => ({ name: n, count: c, pct: Math.round(c / tc * 100) }));
    
        // Unique picks (only 1 team has them)
        const hipsters = Object.entries(pickCounts)
          .filter(([, c]) => c === 1)
          .map(([n]) => n);
    
        // Hottest and coldest teams today
        const sorted = [...lb].sort((a, b) => a.todayTotal - b.todayTotal);
        const hottest = sorted[0] || null;
        const coldest = sorted[sorted.length - 1] || null;
    
        // Best amateurs
        const amateurs = Object.entries(eff)
          .filter(([, s]) => s.amateur)
          .sort((a, b) => a[1].toPar - b[1].toPar)
          .slice(0, 3);
    
        // Individual tournament leader
        const leader = Object.entries(eff)
          .filter(([, s]) => s.status === "active")
          .sort((a, b) => a[1].toPar - b[1].toPar)[0] || null;
    
        // Best LIV golfers in this tournament
        const livGolfers = Object.entries(eff)
          .filter(([name]) => LIV_PLAYERS.has(name))
          .sort((a, b) => a[1].toPar - b[1].toPar)
          .slice(0, 5);
    
        return { mostPickedByTier, mostPicked, hipsters, hottest, coldest, amateurs, leader, livGolfers };
      }, [teams, field, eff, lb]);
    
      // ── Bonus flair computation ───────────────────────────────
      const bonusFlair = useMemo(() => {
        const flair = {}; // { golferName: [{emoji, label}, ...] }
        const addFlair = (name, emoji, label) => {
          if (!flair[name]) flair[name] = [];
          // Avoid exact duplicates
          if (!flair[name].some(f => f.emoji === emoji && f.label === label)) {
            flair[name].push({ emoji, label });
          }
        };
    
        // Tournament winner: position 1 + status indicates final
        const isFinal = (tStatus || "").toLowerCase().includes("final") || (tStatus || "").toLowerCase().includes("official");
        if (isFinal) {
          const winner = Object.entries(eff)
            .filter(([, s]) => s.status === "active")
            .sort((a, b) => a[1].toPar - b[1].toPar)[0];
          if (winner) addFlair(winner[0], "🏆", "Tournament Champion (−2)");
        }
    
        // Low round per completed round
        // Look at each round's gross strokes across all golfers
        const maxRound = Math.max(0, ...Object.values(eff).map(s => (s.rounds || []).length));
        for (let ri = 0; ri < maxRound; ri++) {
          let minStrokes = Infinity;
          let lowNames = [];
          for (const [name, s] of Object.entries(eff)) {
            const strokes = s.rounds?.[ri];
            if (strokes && strokes > 0 && strokes < 100) { // valid score
              if (strokes < minStrokes) {
                minStrokes = strokes;
                lowNames = [name];
              } else if (strokes === minStrokes) {
                lowNames.push(name);
              }
            }
          }
          // Only the current round counts if it's still in progress
          // For past rounds, all golfers will have that round's score
          // Check if this round is complete: it's a past round if ri < maxRound - 1
          // or if the current round is "F" (finished) for leaders
          const isCompletedRound = ri < maxRound - 1 || (tStatus || "").toLowerCase().includes("final");
          // For in-progress current round, only award if enough golfers have finished
          const finishedCount = Object.values(eff).filter(s => s.rounds?.[ri] > 0).length;
          const totalActive = Object.values(eff).filter(s => s.status === "active").length;
          const roundMostlyDone = finishedCount > totalActive * 0.5;
    
          if (lowNames.length > 0 && minStrokes < 72 && (isCompletedRound || roundMostlyDone)) {
            for (const name of lowNames) {
              addFlair(name, "⚡", `Low Round of the Day (−1) — Rd ${ri + 1}`);
            }
          }
        }
    
        // Low amateur
        const amateurs = Object.entries(eff)
          .filter(([, s]) => s.amateur && s.status === "active")
          .sort((a, b) => a[1].toPar - b[1].toPar);

        // Hole-in-one (manually tracked via admin)
        for (const name of aces) {
          addFlair(name, "🕳️", "Hole-in-One (−3)");

        return flair;
      }, [eff, tStatus, aces]);
    
      // ── Admin auth ────────────────────────────────────────────

        ...(isAdmin
          ? [{ id: "admin", l: isMobile ? "🔒" : "🔒 Admin" }]
          : [{ id: "adminLogin", l: "🔒" }]
        ),

      // ═══════════════════════════════════════════════════════════
      // RENDER

      return (
        <div style={S.root}>
          <div style={S.overlay} />

                                          </span>

                                          <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: sz, height: sz, position: "relative" }}>

                                            <span style={{ fontSize: 11, fontWeight: 700, color: "#ff3333", zIndex: 1 }}>{strokes}</span>
                                          </span>

                                        return (
                                          <span style={{ fontSize: 11, fontWeight: 500, color: "rgba(200,184,106,0.8)" }}>{strokes}</span>
                                        );
                                      }
                                      if (rv === 1) {
                                        // Bogey — single square
                                        return (
                                          <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: sz, height: sz, position: "relative" }}>
                                            <svg width={sz} height={sz} style={{ position: "absolute", top: 0, left: 0 }}>
                                              <rect x="1" y="1" width={sz - 2} height={sz - 2} fill="none" stroke="#6ea8fe" strokeWidth="1.5" rx="1" />
                                            </svg>
                                            <span style={{ fontSize: 11, fontWeight: 700, color: "#6ea8fe", zIndex: 1 }}>{strokes}</span>
                                          </span>
                                        );
                                      }
                                      // Double bogey+ — double square

                                        <span style={{ display: "inline-flex", alignItems: "center", justifyContent: "center", width: sz, height: sz, position: "relative" }}>
                                          <svg width={sz} height={sz} style={{ position: "absolute", top: 0, left: 0 }}>

                                          </svg>
                                          <span style={{ fontSize: 11, fontWeight: 700, color: "#6ea8fe", zIndex: 1 }}>{strokes}</span>
                                        </span>
                                      );
                                    };

                                    const inPars = pars.slice(9, 18);
                                    const outHoles = normHoles.slice(0, 9);
                                    const inHoles = normHoles.slice(9, 18);
                                    const outStrokes = outHoles.reduce((a, v, i) => a + (v !== null ? outPars[i] + Math.round(v) : 0), 0);
                                    const inStrokes = inHoles.reduce((a, v, i) => a + (v !== null ? inPars[i] + Math.round(v) : 0), 0);

                                              {inHoles.map((v, i) => (
                                                <td key={i} style={{ textAlign: "center", padding: "2px 0" }}>
                                                  {renderHoleScore(v, inPars[i])}
                                                </td>
                                              ))}
                                              <td style={{
                                                textAlign: "center", fontSize: 12, fontWeight: 700, padding: "2px 3px",
                                                color: inPlayed === 0 ? "rgba(200,184,106,0.15)" : "rgba(200,184,106,0.6)",

                                                {inPlayed > 0 ? inStrokes : "·"}
                                              </td>
                                            </tr>
                                          </tbody>
                                        </table>
                                        <div style={{ display: "flex", gap: 10, marginTop: 4, fontSize: 9, color: "rgba(200,184,106,0.75)" }}>

                                          <span><svg width="10" height="10" style={{verticalAlign:"middle"}}><rect x="1" y="1" width="8" height="8" fill="none" stroke="#6ea8fe" strokeWidth="1" rx="1"/></svg> bogey</span>
                                          <span><svg width="10" height="10" style={{verticalAlign:"middle"}}><rect x="1" y="1" width="8" height="8" fill="none" stroke="#6ea8fe" strokeWidth="1" rx="1"/><rect x="2.5" y="2.5" width="5" height="5" fill="none" stroke="#6ea8fe" strokeWidth="0.7" rx="1"/></svg> dbl+</span>
                                        </div>

                    if (lines.length < 2) { alert("CSV appears empty"); return; }
    
                    // Parse CSV properly (handle quoted fields with commas)
                    const parseCSVLine = (line) => {
                      const result = [];
                      let current = "";
                      let inQuotes = false;
                      for (let i = 0; i < line.length; i++) {
                        const ch = line[i];
                        if (ch === '"') { inQuotes = !inQuotes; }
                        else if (ch === ',' && !inQuotes) { result.push(current.trim()); current = ""; }
                        else { current += ch; }
                      }
                      result.push(current.trim());
                      return result;

                    const headers = parseCSVLine(lines[0]).map(h => h.toLowerCase());

                    if (rankIdx < 0) rankIdx = headers.findIndex(c => c.includes("rank") || c === "rk" || c === "#" || c === "position");

        const payout = leagueForm.payoutSplit === "custom"
          ? leagueForm.customPayout.split("/").map(Number)
          : leagueForm.payoutSplit.split("/").map(Number);

          name: leagueForm.name.trim(),
          tournament: leagueForm.tournament.trim(),
          sport: leagueForm.sport,
          entryFee: Number(leagueForm.entryFee) || 0,
          adminFee: Number(leagueForm.adminFee) || 0,
          payoutSplit: payout,
          venmoUsername: leagueForm.venmoUsername.trim(),
          maxPlayers: Number(leagueForm.maxPlayers) || 20,
          lockDate: leagueForm.lockDate,
          lockTime: leagueForm.lockTime,
          tiers: Number(leagueForm.tiers) || 4,
          picksPerTeam: Number(leagueForm.picksPerTeam) || 10,
          bestOf: Number(leagueForm.bestOf) || 5,
          createdAt: Date.now(),
          ownerId: user.uid,
          ownerEmail: user.email,
        };
        await fbDb.ref(`users/${user.uid}/leagues/${leagueId}`).set(leagueData);
        // Also store in global leagues index for discoverability later

                    </div>
                    <div>
                      <label style={S_DASH.label}>Picks Per Team</label>
                      <input style={S_DASH.input} type="number" value={leagueForm.picksPerTeam} onChange={e => setLeagueForm({...leagueForm, picksPerTeam: e.target.value})} />
                    </div>
                  </div>

                  <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
                    <div>
                      <label style={S_DASH.label}>Best Scores Count</label>
                      <input style={S_DASH.input} type="number" value={leagueForm.bestOf} onChange={e => setLeagueForm({...leagueForm, bestOf: e.target.value})} />
                    </div>
                    <div>
                      <label style={S_DASH.label}>Number of Tiers</label>
                      <select style={S_DASH.select} value={leagueForm.tiers} onChange={e => setLeagueForm({...leagueForm, tiers: e.target.value})}>
                        <option value="4">4 Tiers</option>
                        <option value="5">5 Tiers</option>
                        <option value="6">6 Tiers</option>
                      </select>
                    </div>
                  </div>

                  <label style={S_DASH.label}>Registration Lock Date</label>
                  <input style={{ ...S_DASH.input, colorScheme:"dark" }} type="datetime-local" value={leagueForm.lockDate} onChange={e => setLeagueForm({...leagueForm, lockDate: e.target.value})} />

                  <div style={{ display:"flex", gap:10, marginTop:"20px" }}>
                    <button onClick={createLeague} style={{ ...S_DASH.btn, flex:1 }}>Create League</button>
                    <button onClick={() => setShowCreateLeague(false)} style={{ ...S_DASH.btnOutline, flex:0 }}>Cancel</button>
                  </div>
                </div>
              </div>
            )}

            {/* ── UPGRADE MODAL ────────────────────────── */}
            {showUpgradeModal && (
              <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.95)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:2000 }}>
                <div style={{ background:"#0f172a", padding:"40px", borderRadius:"14px", maxWidth:"520px", width:"100%", textAlign:"center", border:"1px solid rgba(212,175,55,0.2)" }}>
                  <h2 style={{ color:"#d4af37", letterSpacing:2, marginBottom:"8px" }}>UPGRADE POOLSIDE</h2>
                  <p style={{ color:"rgba(255,255,255,0.4)", fontSize:"13px", marginBottom:"24px" }}>Unlock unlimited players and premium features</p>

                  <div onClick={() => handleStripeUpgrade("pro")} style={{ cursor:"pointer", background:"rgba(212,175,55,0.06)", padding:"20px", margin:"12px 0", borderRadius:"10px", border:"1px solid rgba(212,175,55,0.3)", textAlign:"left" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <h3 style={{ color:"#d4af37" }}>Pro</h3>
                      <span style={{ color:"#d4af37", fontSize:"18px", fontWeight:700 }}>$19<span style={{ fontSize:"12px", fontWeight:400 }}>/mo</span></span>
                    </div>
                    <p style={{ color:"rgba(255,255,255,0.5)", fontSize:"12px", marginTop:"8px", lineHeight:1.6 }}>
                      Unlimited players · Custom bonuses · Advanced stats · Weather & news ticker · CSV exports · Priority support
                    </p>
                  </div>

                  <div onClick={() => handleStripeUpgrade("elite")} style={{ cursor:"pointer", background:"rgba(255,100,100,0.04)", padding:"20px", margin:"12px 0", borderRadius:"10px", border:"1px solid rgba(255,100,100,0.2)", textAlign:"left" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                      <h3 style={{ color:"#ff6666" }}>Elite</h3>
                      <span style={{ color:"#ff6666", fontSize:"18px", fontWeight:700 }}>$39<span style={{ fontSize:"12px", fontWeight:400 }}>/mo</span></span>
                    </div>
                    <p style={{ color:"rgba(255,255,255,0.5)", fontSize:"12px", marginTop:"8px", lineHeight:1.6 }}>
                      Everything in Pro · Prop challenges · Season-long tracking · Custom themes & logo · White-label option
                    </p>
                  </div>

                  <button onClick={() => setShowUpgradeModal(false)} style={{ marginTop:"16px", padding:"10px 28px", background:"transparent", border:"1px solid rgba(255,255,255,0.2)", color:"rgba(255,255,255,0.5)", borderRadius:"6px", cursor:"pointer" }}>
                    Maybe Later
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ====================== YOUR ORIGINAL FULL UI ======================
      if (currentView === "pool" && selectedLeague) {
        return (
          <div>
            <button 
              onClick={() => setCurrentView("dashboard")} 
              style={{position:"fixed", top:10, left:10, zIndex:1000, padding:"8px 16px", background:"#c44", color:"white", border:"none", borderRadius:"4px"}}
            >
              ← Back to My Leagues
            </button>
            
            <div style={{paddingTop: "70px"}}>
              <h2 style={{textAlign: "center", color: "#d4c87a", marginBottom: "20px"}}>
                {selectedLeague.name}
              </h2>
              
              {/* YOUR ORIGINAL FULL GOLF POOL UI IS LOADED HERE */}
              <GolfPool />
            </div>
          </div>
        );
      }

      return <div>Loading...</div>;
    }
    function LoginScreen() {
      const [email, setEmail] = useState("");
      const [password, setPassword] = useState("");
      const [isSignUp, setIsSignUp] = useState(false);
      const [error, setError] = useState("");
      const [isLoading, setIsLoading] = useState(false);

      const signInWithGoogle = async () => {
        setIsLoading(true); setError("");
        try {
          const provider = new firebase.auth.GoogleAuthProvider();
          await fbAuth.signInWithPopup(provider);
        } catch (err) { setError(err.message); }
        setIsLoading(false);
      };

      const signInWithEmail = async () => {
        if (!email || !password) { setError("Enter email and password"); return; }
        setIsLoading(true); setError("");
        try {
          if (isSignUp) {
            await fbAuth.createUserWithEmailAndPassword(email, password);
          } else {
            await fbAuth.signInWithEmailAndPassword(email, password);
          }
        } catch (err) { setError(err.message); }
        setIsLoading(false);
      };

      return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(175deg,#0a1729 0%,#0f172a 50%,#0a1729 100%)", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"Georgia, serif" }}>
          <div style={{ background:"rgba(255,255,255,0.03)", padding:"48px 40px", borderRadius:"14px", width:"420px", textAlign:"center", border:"1px solid rgba(212,175,55,0.15)", boxShadow:"0 20px 60px rgba(0,0,0,0.4)" }}>
            <h1 style={{ color:"#d4af37", fontSize:"32px", letterSpacing:4, marginBottom:"4px" }}>POOLSIDE</h1>
            <p style={{ color:"rgba(212,175,55,0.5)", marginBottom:"36px", fontSize:"13px", letterSpacing:2 }}>Run your pool from Poolside</p>

            <button onClick={signInWithGoogle} disabled={isLoading} style={{ width:"100%", padding:"14px", background:"#fff", color:"#333", border:"none", borderRadius:"8px", fontSize:"15px", fontWeight:600, cursor:"pointer", marginBottom:"24px", display:"flex", alignItems:"center", justifyContent:"center", gap:10 }}>
              <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
              {isLoading ? "Signing in..." : "Continue with Google"}
            </button>

            <div style={{ display:"flex", alignItems:"center", margin:"20px 0", gap:12 }}>
              <div style={{ flex:1, height:1, background:"rgba(212,175,55,0.15)" }} />
              <span style={{ color:"rgba(212,175,55,0.3)", fontSize:"12px" }}>or use email</span>
              <div style={{ flex:1, height:1, background:"rgba(212,175,55,0.15)" }} />
            </div>

            <input type="email" placeholder="Email" value={email} onChange={e => setEmail(e.target.value)}
              style={{ width:"100%", padding:"12px 14px", marginBottom:"10px", borderRadius:"6px", border:"1px solid rgba(212,175,55,0.2)", background:"rgba(255,255,255,0.05)", color:"#f0ead0", fontSize:"14px" }} />
            <input type="password" placeholder="Password" value={password} onChange={e => setPassword(e.target.value)}
              style={{ width:"100%", padding:"12px 14px", marginBottom:"16px", borderRadius:"6px", border:"1px solid rgba(212,175,55,0.2)", background:"rgba(255,255,255,0.05)", color:"#f0ead0", fontSize:"14px" }} />

            <button onClick={signInWithEmail} disabled={isLoading} style={{ width:"100%", padding:"14px", background:"#d4af37", color:"#0a1729", border:"none", borderRadius:"8px", fontSize:"15px", fontWeight:700, cursor:"pointer", letterSpacing:1 }}>
              {isLoading ? "..." : isSignUp ? "Create Account" : "Sign In"}
            </button>

            <p onClick={() => setIsSignUp(!isSignUp)} style={{ marginTop:"16px", fontSize:"12px", color:"rgba(212,175,55,0.5)", cursor:"pointer" }}>
              {isSignUp ? "Already have an account? Sign in" : "New here? Create an account"}
            </p>

            {error && <p style={{ color:"#ff6666", marginTop:"12px", fontSize:"13px" }}>{error}</p>}
          </div>
        </div>
      );
    }

    ReactDOM.render(React.createElement(PoolsideApp), document.getElementById("root"));
  </script>
</body>
</html>
